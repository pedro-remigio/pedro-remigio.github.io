<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Game Experience</title>

  <link
    rel="icon"
    type="image/png"
    href="./assets/images/logo.png"
  >

  <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 text-gray-800">

  <header class="bg-black text-white p-4 shadow-lg">

    <div class="container mx-auto flex justify-between items-center">

      <div class="flex items-center gap-3">

        <img
          src="./assets/images/logo.png"
          alt="Logo"
          class="w-12 h-12 rounded-full"
        >

        <h1 class="font-bold text-xl">
          Remigio Eventos
        </h1>

      </div>

      <a href="index.html" class="hover:text-blue-400">
        Voltar
      </a>

    </div>

  </header>

  <main class="container mx-auto py-10 px-6">

    <img
      src="https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=1200&auto=format&fit=crop"
      alt="Game Experience"
      class="w-full h-80 object-cover rounded-xl mb-8"
    >

    <section class="bg-white p-8 rounded-xl shadow-lg">

      <h2 class="text-4xl font-bold mb-4">
        Game Experience
      </h2>

      <p class="mb-4 text-lg">
        📍 Centro de Convenções de Maceió
      </p>

      <p class="mb-6 text-lg">
        📅 24, 25 e 26 de Abril de 2025
      </p>

      <p class="mb-8 text-lg leading-relaxed">
        Evento voltado para fãs de videogames,
        eSports, tecnologia e cultura geek,
        reunindo campeonatos e atrações especiais.

    </section>

  </main>
