<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Eventos</title>

  <link
    rel="icon"
    type="image/png"
    href="./assets/images/logo.png"
  >

  <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 text-gray-800">

  <!-- HEADER -->
  <header class="bg-black text-white fixed top-0 w-full z-50 shadow-lg">

    <!-- MENU PRINCIPAL -->
    <nav class="container mx-auto flex items-center justify-between p-4">

      <!-- LOGO -->
      <div class="flex items-center gap-3">

        <img
          src="./assets/images/logo.png"
          alt="Logo Remigio Eventos"
          class="w-12 h-12 rounded-full object-cover"
        >

        <h1 class="font-bold text-xl">
          Remigio Eventos
        </h1>

      </div>

      <!-- MENU DESKTOP -->
      <ul class="hidden md:flex gap-6">

        <li>
          <a
            href="index.html"
            class="hover:text-blue-400 transition"
          >
            Home
          </a>
        </li>

        <li>
          <a
            href="quem-somos.html"
            class="hover:text-blue-400 transition"
          >
            Quem Somos
          </a>
        </li>

        <li>
          <a
            href="eventos.html"
            class="hover:text-blue-400 transition"
          >
            Eventos
          </a>
        </li>

        <li>
          <a
            href="contato.html"
            class="hover:text-blue-400 transition"
          >
            Contato
          </a>
        </li>

      </ul>

      <!-- BOTÃO MOBILE -->
      <button
        id="menu-button"
        class="md:hidden bg-gray-900 hover:bg-blue-600 transition px-4 py-2 rounded-lg text-2xl shadow-lg"
      >
        ☰
      </button>

    </nav>

    <!-- MENU MOBILE -->
    <div
      id="mobile-menu"
      class="hidden md:hidden bg-black px-5 pb-6 pt-2 shadow-2xl"
    >

      <div class="flex flex-col gap-4">

        <a
          href="index.html"
          class="bg-gray-900 hover:bg-blue-600 transition duration-300 rounded-xl px-5 py-4 text-lg font-semibold shadow-lg"
        >
          🏠 Home
        </a>

        <a
          href="quem-somos.html"
          class="bg-gray-900 hover:bg-blue-600 transition duration-300 rounded-xl px-5 py-4 text-lg font-semibold shadow-lg"
        >
          👥 Quem Somos
        </a>

        <a
          href="eventos.html"
          class="bg-gray-900 hover:bg-blue-600 transition duration-300 rounded-xl px-5 py-4 text-lg font-semibold shadow-lg"
        >
          🎟️ Eventos
        </a>

        <a
          href="contato.html"
          class="bg-gray-900 hover:bg-blue-600 transition duration-300 rounded-xl px-5 py-4 text-lg font-semibold shadow-lg"
        >
          📞 Contato
        </a>

      </div>

    </div>

    <!-- VOLTAR -->
    <div class="bg-gray-900 px-6 py-3 flex justify-end">

      <a
        href="index.html"
        class="bg-black hover:bg-blue-600 transition px-4 py-2 rounded-lg shadow-lg"
      >
        ← Voltar
      </a>

    </div>

  </header>

  <!-- MAIN -->
  <main class="container mx-auto pt-44 pb-12 px-6">

    <h2 class="text-4xl font-bold mb-10">
      Próximos Eventos
    </h2>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">

      <!-- CARD TECH SUMMIT -->
      <article class="bg-white rounded-xl shadow-lg overflow-hidden hover:scale-105 transition duration-300">

        <img
          src="https://images.unsplash.com/photo-1511578314322-379afb476865?q=80&w=1200&auto=format&fit=crop"
          alt="Tech Summit 2026"
          class="w-full h-56 object-cover"
        >

        <div class="p-6">

          <h3 class="text-2xl font-bold mb-2">
            Tech Summit 2026
          </h3>

          <p class="mb-2 text-gray-600">
            📍 Centro de Convenções de Maceió
          </p>

          <p class="mb-6 text-gray-600">
            📅 14 e 15 de Agosto de 2026
          </p>

          <a
            href="tech-summit.html"
            class="inline-block bg-blue-600 hover:bg-blue-700 transition text-white px-5 py-3 rounded-lg font-semibold"
          >
            Saiba Mais
          </a>

        </div>

      </article>

    </div>

  </main>

  <script>

    // MENU MOBILE
    const menuButton = document.getElementById("menu-button");

    const mobileMenu = document.getElementById("mobile-menu");

    menuButton.addEventListener("click", () => {

      mobileMenu.classList.toggle("hidden");

    });

  </script>

</body>
</html>
