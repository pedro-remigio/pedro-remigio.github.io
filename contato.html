<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Contato</title>

  <link
    rel="icon"
    type="image/png"
    href="./assets/images/logo.png"
  >

  <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 text-gray-800">

  <!-- HEADER -->
  <header class="bg-black text-white fixed top-0 w-full z-50 shadow-lg">

    <!-- MENU PRINCIPAL -->
    <nav class="container mx-auto flex items-center justify-between p-4">

      <!-- LOGO -->
      <div class="flex items-center gap-3">

        <img
          src="./assets/images/logo.png"
          alt="Logo Remigio Eventos"
          class="w-12 h-12 rounded-full object-cover"
        >

        <h1 class="font-bold text-xl">
          Remigio Eventos
        </h1>

      </div>

      <!-- MENU DESKTOP -->
      <ul class="hidden md:flex gap-6">

        <li>
          <a
            href="index.html"
            class="hover:text-blue-400 transition"
          >
            Home
          </a>
        </li>

        <li>
          <a
            href="quem-somos.html"
            class="hover:text-blue-400 transition"
          >
            Quem Somos
          </a>
        </li>

        <li>
          <a
            href="eventos.html"
            class="hover:text-blue-400 transition"
          >
            Eventos
          </a>
        </li>

        <li>
          <a
            href="contato.html"
            class="hover:text-blue-400 transition"
          >
            Contato
          </a>
        </li>

      </ul>

      <!-- BOTÃO MOBILE -->
      <button
        id="menu-button"
        class="md:hidden bg-gray-900 hover:bg-blue-600 transition px-4 py-2 rounded-lg text-2xl shadow-lg"
      >
        ☰
      </button>

    </nav>

    <!-- MENU MOBILE -->
    <div
      id="mobile-menu"
      class="hidden md:hidden bg-black px-5 pb-6 pt-2 shadow-2xl"
    >

      <div class="flex flex-col gap-4">

        <a
          href="index.html"
          class="bg-gray-900 hover:bg-blue-600 transition duration-300 rounded-xl px-5 py-4 text-lg font-semibold shadow-lg"
        >
          🏠 Home
        </a>

        <a
          href="quem-somos.html"
          class="bg-gray-900 hover:bg-blue-600 transition duration-300 rounded-xl px-5 py-4 text-lg font-semibold shadow-lg"
        >
          👥 Quem Somos
        </a>

        <a
          href="eventos.html"
          class="bg-gray-900 hover:bg-blue-600 transition duration-300 rounded-xl px-5 py-4 text-lg font-semibold shadow-lg"
        >
          🎟️ Eventos
        </a>

        <a
          href="contato.html"
          class="bg-gray-900 hover:bg-blue-600 transition duration-300 rounded-xl px-5 py-4 text-lg font-semibold shadow-lg"
        >
          📞 Contato
        </a>

      </div>

    </div>

    <!-- VOLTAR -->
    <div class="bg-gray-900 px-6 py-3 flex justify-end">

      <a
        href="index.html"
        class="bg-black hover:bg-blue-600 transition px-4 py-2 rounded-lg shadow-lg"
      >
        ← Voltar
      </a>

    </div>

  </header>

  <!-- MAIN -->
  <main class="container mx-auto pt-44 pb-16 px-6">

    <section class="bg-white p-8 rounded-xl shadow-lg max-w-2xl mx-auto">

      <h2 class="text-4xl font-bold mb-6">
        Contato
      </h2>

      <p class="mb-2 text-lg">
        📧 remigio.pedro@gmail.com
      </p>

      <p class="mb-8 text-lg">
        📱 (82) 99655-8114
      </p>

      <!-- FORM -->
      <form
        id="form-contato"
        class="space-y-5"
      >

        <!-- NOME -->
        <div>

          <label
            for="nome"
            class="block mb-2 font-semibold"
          >
            Nome
            <span class="text-red-600">*</span>
          </label>

          <input
            type="text"
            id="nome"
            required
            placeholder="Digite seu nome"
            class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
          >

        </div>

        <!-- EMAIL -->
        <div>

          <label
            for="email"
            class="block mb-2 font-semibold"
          >
            Email
            <span class="text-red-600">*</span>
          </label>

          <input
            type="email"
            id="email"
            required
            placeholder="Digite seu email"
            class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
          >

        </div>

        <!-- EVENTO -->
        <div>

          <label
            for="evento"
            class="block mb-2 font-semibold"
          >
            Evento
          </label>

          <input
            type="text"
            id="evento"
            placeholder="Ex: Tech Summit 2026"
            class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
          >

        </div>

        <!-- MENSAGEM -->
        <div>

          <label
            for="mensagem"
            class="block mb-2 font-semibold"
          >
            Mensagem
            <span class="text-red-600">*</span>
          </label>

          <textarea
            id="mensagem"
            rows="5"
            required
            placeholder="Digite sua mensagem"
            class="w-full border border-gray-300 rounded-lg p-3 resize-none focus:outline-none focus:ring-2 focus:ring-blue-500"
          ></textarea>

        </div>

        <!-- BOTÃO -->
        <button
          type="submit"
          id="botao-enviar"
          class="bg-blue-600 hover:bg-blue-700 transition text-white px-6 py-3 rounded-lg font-semibold w-full md:w-auto disabled:opacity-50 disabled:cursor-not-allowed"
        >
          Enviar Mensagem
        </button>

      </form>

      <!-- FEEDBACK -->
      <p
        id="mensagem-sucesso"
        class="hidden text-green-600 mt-6 font-bold text-center"
      >
        ✅ Mensagem enviada com sucesso!
      </p>

      <p
        id="mensagem-erro"
        class="hidden text-red-600 mt-6 font-bold text-center"
      >
      </p>

    </section>

  </main>

  <script>

    // MENU MOBILE
    const menuButton = document.getElementById("menu-button");

    const mobileMenu = document.getElementById("mobile-menu");

    menuButton.addEventListener("click", () => {

      mobileMenu.classList.toggle("hidden");

    });

    // FORMULÁRIO
    const API_URL = "https://remigio-eventos-backend.onrender.com";

    function mensagemErroHttp(status) {

      const mensagens = {
        400: "Dados inválidos. Verifique os campos e tente novamente.",
        404: "Recurso não encontrado (404).",
        408: "Tempo de espera esgotado (408). Tente novamente.",
        500: "Erro interno do servidor (500).",
        502: "Servidor indisponível no momento (502).",
        503: "Servidor indisponível no momento (503).",
      };

      return mensagens[status] || `Ocorreu um erro inesperado (${status}).`;

    }

    const formContato = document.getElementById("form-contato");

    const mensagemSucesso = document.getElementById("mensagem-sucesso");

    const mensagemErro = document.getElementById("mensagem-erro");

    const botaoEnviar = document.getElementById("botao-enviar");

    formContato.addEventListener("submit", async (event) => {

      event.preventDefault();

      if (botaoEnviar.disabled) return;

      mensagemSucesso.classList.add("hidden");

      mensagemErro.classList.add("hidden");

      const dados = {
        nome: document.getElementById("nome").value,
        email: document.getElementById("email").value,
        evento: document.getElementById("evento").value,
        mensagem: document.getElementById("mensagem").value,
      };

      botaoEnviar.disabled = true;

      botaoEnviar.textContent = "Enviando...";

      try {

        const resposta = await fetch(`${API_URL}/api/leads`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(dados),
        });

        if (!resposta.ok) {

          let resultado = {};

          try {
            resultado = await resposta.json();
          } catch (_erroJson) {}

          mensagemErro.textContent = `❌ ${resultado.erro || mensagemErroHttp(resposta.status)}`;

          mensagemErro.classList.remove("hidden");

          return;

        }

        mensagemSucesso.classList.remove("hidden");

        formContato.reset();

      } catch (erro) {

        mensagemErro.textContent = "❌ Não foi possível conectar. Tente novamente em instantes.";

        mensagemErro.classList.remove("hidden");

        return;

      } finally {

        botaoEnviar.disabled = false;

        botaoEnviar.textContent = "Enviar Mensagem";

      }

      setTimeout(() => {

        mensagemSucesso.classList.add("hidden");

      }, 4000);

    });

  </script>

</body>
</html>
